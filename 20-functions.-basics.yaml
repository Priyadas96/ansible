- name: functions basics
  hosts: local
  connection: local
  vars:
    Persons: "Amar,Akbar,Antony,Prasad"
  tasks:
    - name: print undefined name
      ansible.builtin.debug:
        msg: "Hello, {{ person | default('Mohan') }}"

    - name: print from the list
      ansible.builtin.debug:
        msg: "Hello, {{ Persons | split(',') }}"

    - name: convert map to list
      vars:
        course:
          name: ansible
          duration: 4 hr
          trainer: sivakumar
      ansible.builtin.debug:
        msg: "Course Info, {{ course | dict2items }}"

    - name: convert list to map
      vars:
        course:
          - { "key": "name", "value": "ansible" }
          - { "key": "duration", "value": "4 hr" }
          - { "key": "trainer", "value": "sivakumar" }
      ansible.builtin.debug:
        msg: "Hello, {{ course | items2dict }}"
