- name: # Check condition if given number is greater or lesser than 100
  hosts: local
  connection: local
  vars:
    NUMBER: 79
  tasks:
    - name: #Print if number less than 100
      ansible.builtin.debug:
        msg: "Given number {{ NUMBER }} is less than or equal to 100"
      when: NUMBER <= 100

    - name: #Print if number greater than 100
      ansible.builtin.debug:
        msg: "Given number {{ NUMBER }} is greater than or equal to 100"
      when: NUMBER > 100
